<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>氣象概況 - 2026釜山海岸賞櫻之旅</title>

    <!-- Google Fonts: Quicksand & Noto Sans TC -->
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Quicksand:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">

</head>

<body class="pb-32">

    <!-- Header & Flight Info -->
    <header id="main-header"
        class="coastal-gradient text-white pt-6 pb-12 px-6 rounded-b-[2.5rem] shadow-2xl relative overflow-hidden">
        <div class="absolute top-[-20px] right-[-20px] opacity-10 text-[8rem] rotate-12">
            <i class="fas fa-ship"></i>
        </div>

        <h1 class="text-3xl font-bold mb-1 tracking-tight drop-shadow-md">釜山海岸賞櫻之旅 🌊</h1>
        <p class="text-sky-100 text-sm mb-4 flex items-center gap-2 font-medium">
            <i class="fas fa-calendar-day"></i> 2026.03.29 - 04.04 (7天6夜)
        </p>

        <div class="grid grid-cols-1 gap-2 relative z-10">
            <div
                class="bg-white/10 backdrop-blur-lg border border-white/20 px-4 py-2 rounded-2xl flex items-center gap-4">
                <div class="bg-white/20 w-9 h-9 rounded-xl flex items-center justify-center">
                    <i class="fas fa-plane-departure"></i>
                </div>
                <div class="flex-1">
                    <span class="block opacity-60 text-[13px] font-bold uppercase tracking-wider">去程 3/29 · 濟州航空
                        7C6164</span>
                    <span class="font-bold">02:50 TPE → 06:10 PUS</span>
                </div>
            </div>
            <div
                class="bg-white/10 backdrop-blur-lg border border-white/20 px-4 py-2 rounded-2xl flex items-center gap-4">
                <div class="bg-white/20 w-9 h-9 rounded-xl flex items-center justify-center">
                    <i class="fas fa-plane-arrival"></i>
                </div>
                <div class="flex-1">
                    <span class="block opacity-60 text-[13px] font-bold uppercase tracking-wider">回程 4/4 · 德威航空
                        TW663</span>
                    <span class="font-bold">22:50 TAE → 00:25 TPE</span>
                </div>
            </div>
        </div>

        <!-- Waves SVG -->
        <svg class="waves-svg" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
            viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
            <defs>
                <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
            </defs>
            <g class="parallax">
                <use xlink:href="#gentle-wave" x="48" y="0" fill="rgba(255,255,255,0.7)" />
                <use xlink:href="#gentle-wave" x="48" y="3" fill="rgba(255,255,255,0.5)" />
                <use xlink:href="#gentle-wave" x="48" y="5" fill="rgba(255,255,255,0.3)" />
                <use xlink:href="#gentle-wave" x="48" y="7" fill="#fff" />
            </g>
        </svg>
    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="px-4 mt-8">
        <!-- WEATHER Section (舊名工具) -->
        <section id="page-info" class="tab-page">
            <h2 class="text-3xl font-bold text-slate-800 mb-8">氣象概況</h2>

            <div class="space-y-8">
                <!-- Busan Card -->
                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-[3rem] p-1 shadow-2xl">
                    <div class="bg-black/10 backdrop-blur-sm p-8 rounded-[3rem] text-white">
                        <div class="flex items-center gap-3 mb-6">
                            <i class="fas fa-location-dot text-sky-300"></i>
                            <span class="text-xl font-bold">釜山 (Busan)</span>
                        </div>
                        <div id="weather-busan" class="min-h-[200px] flex flex-col justify-center items-center">
                            <div class="animate-pulse flex flex-col items-center gap-4">
                                <div class="w-16 h-16 bg-white/20 rounded-full"></div>
                                <div class="h-4 w-32 bg-white/20 rounded"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Daegu Card -->
                <div class="bg-gradient-to-br from-teal-500 to-emerald-700 rounded-[3rem] p-1 shadow-2xl">
                    <div class="bg-black/10 backdrop-blur-sm p-8 rounded-[3rem] text-white">
                        <div class="flex items-center gap-3 mb-6">
                            <i class="fas fa-location-dot text-teal-300"></i>
                            <span class="text-xl font-bold">大邱 (Daegu)</span>
                        </div>
                        <div id="weather-daegu" class="min-h-[200px] flex flex-col justify-center items-center">
                            <div class="animate-pulse flex flex-col items-center gap-4">
                                <div class="w-16 h-16 bg-white/20 rounded-full"></div>
                                <div class="h-4 w-32 bg-white/20 rounded"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav
        class="fixed bottom-3 left-8 right-8 h-20 bg-white/90 backdrop-blur-xl border border-white/40 rounded-[2.5rem] shadow-[0_25px_60px_rgba(0,119,182,0.15)] z-50 flex items-center justify-around px-4">
        <a href="index.html" class="nav-btn text-slate-400 flex flex-col items-center gap-1 transition-all">
            <i class="fas fa-calendar-alt text-2xl"></i>
            <span class="text-[11px] font-bold">行程</span>
        </a>
        <a href="guide.html" class="nav-btn text-slate-400 flex flex-col items-center gap-1 transition-all">
            <i class="fas fa-map-marked-alt text-2xl"></i>
            <span class="text-[11px] font-bold">導覽</span>
        </a>
        <a href="wallet.html" class="nav-btn text-slate-400 flex flex-col items-center gap-1 transition-all">
            <i class="fas fa-calculator text-2xl"></i>
            <span class="text-[11px] font-bold">計算機</span>
        </a>
        <a href="weather.html" class="nav-btn nav-active flex flex-col items-center gap-1 transition-all">
            <i class="fas fa-cloud-sun text-2xl"></i>
            <span class="text-[11px] font-bold">天氣</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>

</html>
