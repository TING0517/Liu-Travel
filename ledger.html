<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>記帳本 - 2026釜山海岸賞櫻之旅</title>

    <!-- Google Fonts: Quicksand & Noto Sans TC -->
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Quicksand:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="釜山賞櫻">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#0077B6">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registered!', reg))
                    .catch(err => console.log('SW registration failed!', err));
            });

            // 偵測 Service Worker 更新並自動重載頁面
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                window.location.reload();
                refreshing = true;
            });
        }
    </script>

    <style>
        .expense-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .expense-card:active {
            transform: scale(0.98);
        }

        .modal-backdrop {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
        }

        .form-input {
            width: 100%;
            background: #f8fafc;
            border: 2px solid #f1f5f9;
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            transition: all 0.2s;
        }

        .form-input:focus {
            background: white;
            border-color: #0077B6;
            outline: none;
            box-shadow: 0 0 0 4px rgba(0, 119, 182, 0.1);
        }

        .currency-toggle {
            display: flex;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 12px;
            gap: 4px;
        }

        .currency-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 800;
            transition: all 0.2s;
            color: #94a3b8;
        }

        .currency-btn.active {
            background: white;
            color: #0077B6;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .fx-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            padding: 6px 16px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 700;
            color: white;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fx-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body class="pb-32 bg-slate-50">

    <!-- Loading Overlay (暫時註解)
    <div id="loading-overlay">
        <div class="loader-spinner"></div>
        <div class="loading-text">雲端資料庫讀取中</div>
    </div>
    -->

    <!-- Header (暫時註解)
    <header class="coastal-gradient pt-6 pb-12 px-6 rounded-b-[2.5rem] shadow-xl relative overflow-hidden">
        ... (內容略) ...
    </header>
    -->

    <!-- 無花費佔位顯示 -->
    <main class="flex flex-col items-center justify-center min-h-[100vh] px-8 text-center coastal-gradient text-white">
        <div
            class="w-24 h-24 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center mb-6 border border-white/30 text-white">
            <i class="fas fa-receipt text-4xl"></i>
        </div>
        <h2 class="text-3xl font-black mb-2 tracking-tight">目前沒有進行中的旅程</h2>
        <p class="text-sky-100 font-medium mb-10 leading-relaxed max-w-[280px]">
            現在是放鬆心情的好時機。<br>想念之前的回憶嗎？
        </p>
        <a href="history.html"
            class="bg-white text-sky-700 px-10 py-4 rounded-2xl font-black shadow-xl active:scale-95 transition-all flex items-center gap-2">
            <i class="fas fa-history"></i> 前往歷史旅程
        </a>
    </main>

    <!-- Expense List Page (暫時註解)
    <main class="px-5 -mt-8 relative z-20">
        ... (內容略) ...
    </main>
    -->

    <!-- New/Edit Modal -->
    <div id="expense-modal" class="fixed inset-0 z-[60] hidden">
        <div class="modal-backdrop absolute inset-0" onclick="closeModal()"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[2.5rem] shadow-2xl p-8 transform transition-transform duration-300 translate-y-full"
            id="modal-content">
            <div class="flex justify-between items-center mb-8">
                <h3 id="modal-title" class="text-2xl font-black text-slate-800">新增支出項目</h3>
                <button onclick="closeModal()" class="text-slate-300 hover:text-slate-500">
                    <i class="fas fa-times-circle text-2xl"></i>
                </button>
            </div>

            <form id="expense-form" class="space-y-6">
                <input type="hidden" id="entry-id">

                <div class="space-y-2">
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest ml-1">日期</label>
                    <input type="date" id="entry-date" class="form-input" required>
                </div>

                <div class="space-y-2">
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest ml-1">項目名稱</label>
                    <input type="text" id="entry-name" class="form-input" placeholder="例如：炸雞早餐、車票" required>
                </div>

                <div class="space-y-4">
                    <div class="space-y-2">
                        <label id="price-label"
                            class="block text-xs font-black text-slate-400 uppercase tracking-widest ml-1">金額
                            (KRW)</label>
                        <div class="currency-toggle w-full">
                            <button type="button" onclick="setCurrency('KRW')" id="btn-krw"
                                class="currency-btn active">KRW (韓元)</button>
                            <button type="button" onclick="setCurrency('TWD')" id="btn-twd" class="currency-btn">TWD
                                (台幣)</button>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <input type="number" id="entry-price"
                            class="form-input h-[56px] text-2xl font-black text-slate-800" placeholder="0" required>
                    </div>
                </div>

                <div class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl border-2 border-slate-100/50">
                    <input type="checkbox" id="entry-behalf" class="w-5 h-5 accent-sky-600 rounded">
                    <label for="entry-behalf" class="text-sm font-black text-slate-600 cursor-pointer">此筆款項為「代付」</label>
                </div>

                <div class="space-y-2">
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest ml-1">備註
                        (可選)</label>
                    <input type="text" id="entry-remark" class="form-input" placeholder="想記點什麼...">
                </div>

                <div class="pt-4 flex flex-col gap-3">
                    <button type="submit"
                        class="w-full bg-sky-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-sky-600/30 active:scale-95 transition-all">
                        儲存支出
                    </button>
                    <button type="button" id="delete-btn" onclick="deleteEntry()"
                        class="w-full bg-red-50 text-red-500 py-4 rounded-2xl font-bold active:scale-95 transition-all hidden">
                        <i class="fas fa-trash-alt mr-2"></i> 刪除此筆
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="main-nav">
        <a href="history.html" class="nav-item">
            <i class="fas fa-history"></i>
            <span>歷史旅程</span>
        </a>
        <a href="wallet.html" class="nav-item">
            <i class="fas fa-calculator"></i>
            <span>計算機</span>
        </a>
        <a href="index.html" class="nav-item-home">
            <div class="nav-home-icon">
                <i class="fas fa-home"></i>
            </div>
        </a>
        <a href="ledger.html" class="nav-item active">
            <i class="fas fa-receipt"></i>
            <span>記帳</span>
        </a>
        <a href="weather.html" class="nav-item">
            <i class="fas fa-cloud-sun"></i>
            <span>天氣</span>
        </a>
    </nav>

    <!-- Scripts -->
    <!--Firebase SDK -->
    <!--Firebase SDK (暫時註解)
    <script type="module" src="ledger.js"></script>
    -->
</body>

</html>
