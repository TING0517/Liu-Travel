<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDF 行程 - Liu Family 旅行</title>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Quicksand:wght@500;700&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="force-install.js"></script>
    <!-- FontAwesome (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        /* 針對 iOS iframe 滾動做的專屬設定 */
        .pdf-container {
            -webkit-overflow-scrolling: touch;
            position: relative;
        }
    </style>
</head>

<body class="bg-slate-100 no-bounce h-[100dvh] w-screen flex flex-col overflow-hidden">

    <!-- PDF Header -->
    <header
        class="coastal-gradient text-white pt-6 pb-6 px-6 rounded-b-[2.5rem] shadow-2xl relative overflow-hidden z-20 flex-shrink-0">
        <!-- 背景裝飾 -->
        <div id="header-decoration"
            class="absolute top-[-20px] right-[-20px] opacity-10 text-[8rem] rotate-12 pointer-events-none">
            <i class="fas fa-file-pdf"></i>
        </div>

        <div class="relative z-10 mb-4">
            <h1 id="pdf-title" class="text-3xl font-black mb-1 tracking-tight truncate w-full drop-shadow-md">PDF 行程手冊
            </h1>
            <p id="pdf-date" class="text-white/70 text-xs font-medium flex items-center gap-2">
                <i class="fas fa-calendar-day"></i> 載入中...
            </p>
        </div>

        <!-- Waves SVG -->
        <svg class="waves-svg" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
            viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
            <defs>
                <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
            </defs>
            <g class="parallax">
                <use xlink:href="#gentle-wave" x="48" y="0" fill="rgba(255,255,255,0.7)" />
                <use xlink:href="#gentle-wave" x="48" y="3" fill="rgba(255,255,255,0.5)" />
                <use xlink:href="#gentle-wave" x="48" y="5" fill="rgba(255,255,255,0.3)" />
                <use xlink:href="#gentle-wave" x="48" y="7" fill="#f1f5f9" />
            </g>
        </svg>
    </header>

    <main class="flex-1 w-full bg-slate-100 pdf-container relative">
        <iframe id="pdf-frame" class="absolute pt-4 inset-0 w-full h-[112%] border-0" title="PDF Viewer"></iframe>

        <!-- 行動裝置/Android 專用備用開啟按鈕 -->
        <div id="mobile-fallback"
            class="hidden absolute inset-0 flex-col items-center justify-center p-8 text-center bg-slate-100 z-10 pt-4">
            <div
                class="w-24 h-24 bg-red-100 text-red-500 rounded-[2.5rem] flex items-center justify-center text-4xl mb-6 shadow-lg shadow-red-500/20">
                <i class="fas fa-file-pdf"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">文件已經準備好</h2>
            <p class="text-slate-500 text-sm mb-8 font-medium">因 Android 系統限制無法直接預覽<br>請點擊下方按鈕開啟或下載 PDF 手冊</p>
            <button id="mobile-open-btn"
                class="bg-slate-800 text-white font-bold text-lg px-8 py-4 rounded-full shadow-xl shadow-slate-800/30 active:scale-95 transition-all flex items-center gap-3">
                <i class="fas fa-external-link-alt mt-[-1px]"></i> 開啟 PDF 行程手冊
            </button>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="main-nav">
        <a href="history.html" class="nav-item">
            <i class="fas fa-list-ul"></i>
            <span>回選單</span>
        </a>
        <a href="index.html" class="nav-item-home">
            <div class="nav-home-icon">
                <i class="fas fa-home"></i>
            </div>
        </a>
        <a id="nav-link-itinerary" href="#" class="nav-item active">
            <i class="fas fa-calendar-alt"></i>
            <span>行程</span>
        </a>
    </nav>

    <script type="module">
        import { trips } from './data/config.js';

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const pdfUrl = params.get('pdfUrl');
            const tripId = params.get('tripId');

            if (tripId) {
                const t = trips.find(x => x.id === tripId);
                if (t) {
                    document.getElementById('pdf-title').innerText = t.name;
                    document.title = `${t.name} - 行程手冊`;

                    const dateEl = document.getElementById('pdf-date');
                    if (dateEl && t.startDate && t.endDate) {
                        const startStr = t.startDate.replace(/-/g, '.');
                        const endStr = t.endDate.replace(/-/g, '.');
                        dateEl.innerHTML = `<i class="fas fa-calendar-day"></i> ${startStr} - ${endStr}`;
                    }
                }
            }

            if (pdfUrl) {
                // 必須編碼 URI，避免中文檔名被解析錯誤，造成無法下載或開啟
                const encodedPdfUrl = encodeURI(pdfUrl);

                // 判斷是否為行動裝置 (特別是 Android)
                const isAndroid = /Android/i.test(navigator.userAgent);

                if (isAndroid) {
                    // Android 系統不支援 iframe 預覽 PDF，會跳出亂碼與錯誤的下載檔名
                    // 改用專屬設計的開啟按鈕，給予更好的使用者體驗
                    document.getElementById('pdf-frame').classList.add('hidden');
                    const fallback = document.getElementById('mobile-fallback');
                    fallback.classList.remove('hidden');
                    fallback.classList.add('flex');

                    document.getElementById('mobile-open-btn').addEventListener('click', () => {
                        // 重點：Android 下載或開啟時，千萬不要帶入 #hash，否則副檔名會損毀出現「無法開啟」
                        window.location.href = encodedPdfUrl;
                    });
                } else {
                    // iOS 或電腦版，可以順利使用 iframe 預覽
                    // 使用 #toolbar=0 來隱藏瀏覽器內建的深灰色 PDF 工具列
                    // 加上 view=FitH 讓頁面依照寬度自適應填滿
                    document.getElementById('pdf-frame').src = encodedPdfUrl + '#toolbar=0&navpanes=0&scrollbar=0&view=FitH';
                }
            } else {
                alert('此行程尚未提供 PDF 網址');
                window.location.href = 'history.html';
            }
        };
    </script>
</body>

</html>
