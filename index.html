<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026釜山海岸賞櫻之旅</title>

    <!-- Google Fonts: Quicksand & Noto Sans TC -->
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Quicksand:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="釜山賞櫻">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#0077B6">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registered!', reg))
                    .catch(err => console.log('SW registration failed!', err));
            });

            // 偵測 Service Worker 更新並自動重載頁面
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                window.location.reload();
                refreshing = true;
            });
        }
    </script>

</head>

<body class="bg-slate-50">

    <!-- Loading Overlay (暫時註解)
    <div id="loading-overlay">
        <div class="loader-spinner"></div>
        <div class="loading-text">雲端資料庫讀取中</div>
    </div>
    -->

    <!-- Header & Flight Info (暫時註解)
    <header id="main-header"
        class="coastal-gradient text-white pt-6 pb-12 px-6 rounded-b-[2.5rem] shadow-2xl relative overflow-hidden">
        ... (內容略) ...
    </header>
    -->

    <!-- 無行程佔位顯示 -->
    <main class="flex flex-col items-center justify-center min-h-[100vh] px-8 text-center coastal-gradient text-white">
        <div
            class="w-24 h-24 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center mb-6 border border-white/30">
            <i class="fas fa-map-marked-alt text-4xl"></i>
        </div>
        <h2 class="text-3xl font-black mb-2 tracking-tight">目前沒有進行中的旅程</h2>
        <p class="text-sky-100 font-medium mb-10 leading-relaxed max-w-[280px]">
            現在是放鬆心情的好時機。<br>想念之前的回憶嗎？
        </p>
        <a href="history.html"
            class="bg-white text-sky-700 px-10 py-4 rounded-2xl font-black shadow-xl active:scale-95 transition-all flex items-center gap-2">
            <i class="fas fa-history"></i> 查看歷史旅程
        </a>
    </main>

    <!-- Main Content Area (暫時註解)
    <main id="main-content" class="px-4 mt-8">
        ... (內容略) ...
    </main>
    -->

    <!-- Bottom Navigation -->
    <nav class="main-nav">
        <a href="history.html" class="nav-item">
            <i class="fas fa-history"></i>
            <span>歷史旅程</span>
        </a>
        <a href="wallet.html" class="nav-item">
            <i class="fas fa-calculator"></i>
            <span>計算機</span>
        </a>
        <a href="index.html" class="nav-item-home active">
            <div class="nav-home-icon">
                <i class="fas fa-home"></i>
            </div>
        </a>
        <a href="ledger.html" class="nav-item">
            <i class="fas fa-receipt"></i>
            <span>記帳</span>
        </a>
        <a href="weather.html" class="nav-item">
            <i class="fas fa-cloud-sun"></i>
            <span>天氣</span>
        </a>
    </nav>

    <!-- Itinerary Edit Modal -->
    <div id="itinerary-modal" class="fixed inset-0 z-[60] hidden">
        <div class="modal-backdrop absolute inset-0" onclick="closeItineraryModal()"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[3rem] shadow-2xl p-8 transform transition-transform duration-300 translate-y-full"
            id="itinerary-modal-content">
            <div class="flex justify-between items-center mb-8">
                <h3 id="itinerary-modal-title" class="text-2xl font-black text-slate-800">編輯行程</h3>
                <button onclick="closeItineraryModal()" class="text-slate-300 hover:text-slate-500">
                    <i class="fas fa-times-circle text-2xl"></i>
                </button>
            </div>
            <form id="itinerary-form" class="space-y-5">
                <input type="hidden" id="event-id">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="block text-xs font-black text-slate-400 uppercase tracking-widest ml-1">時間</label>
                        <input type="time" id="event-time" class="form-input" required>
                    </div>
                    <div class="space-y-2">
                        <label
                            class="block text-xs font-black text-slate-400 uppercase tracking-widest ml-1">停留時間</label>
                        <input type="text" id="event-stay" class="form-input" placeholder="例如：1.5小時">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest ml-1">行程內容</label>
                    <input type="text" id="event-text" class="form-input" placeholder="去哪裡或做什麼..." required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="block text-xs font-black text-slate-400 uppercase tracking-widest ml-1">類型</label>
                        <select id="event-type" class="form-input">
                            <option value="normal">一般行程</option>
                            <option value="food">用餐</option>
                            <option value="hotel">住宿</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-3 pt-6">
                        <input type="checkbox" id="event-highlight" class="w-5 h-5 accent-amber-500 rounded">
                        <label for="event-highlight"
                            class="text-sm font-black text-slate-600 cursor-pointer">設為重點行程</label>
                    </div>
                </div>
                <div class="pt-6 flex flex-col gap-3">
                    <button type="submit"
                        class="w-full bg-slate-800 text-white py-4 rounded-2xl font-black shadow-xl active:scale-95 transition-all">儲存行程</button>
                    <button type="button" id="event-delete-btn" onclick="deleteItineraryItem()"
                        class="w-full bg-red-50 text-red-500 py-4 rounded-2xl font-bold active:scale-95 transition-all hidden">刪除此行程</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Scripts (暫時註解)
    <script type="module" src="script.js"></script>
    -->
</body>

</html>
