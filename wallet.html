<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>匯率計算機 - 2026釜山海岸賞櫻之旅</title>

    <!-- Google Fonts: Quicksand & Noto Sans TC -->
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Quicksand:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">

</head>

<body class="pb-32">

    <!-- Main Content Area -->
    <main id="main-content" class="px-4 mt-8">
        <!-- CALCULATOR Section (舊名錢包) -->
        <section id="page-wallet" class="tab-page">
            <div class="bg-white rounded-[2rem] p-4 shadow-2xl border border-slate-100 overflow-hidden">
                <!-- Top Info & Reset -->
                <div class="flex justify-between items-center mb-4">
                    <button onclick="changeFxRate()" id="fx-rate-display"
                        class="px-4 py-1.5 bg-sky-50 text-sky-600 rounded-full text-s font-bold tracking-wider active:scale-95 transition-transform">
                        匯率 1 : 46
                    </button>
                    <button onclick="resetCalculator()" class="text-slate-300 hover:text-red-500 transition-colors p-2">
                        <i class="fas fa-redo text-lg"></i>
                    </button>
                </div>

                <!-- Display Area -->
                <div class="space-y-1.5 mb-2">
                    <div class="relative">
                        <label
                            class="block text-[14px] font-black text-slate-300 uppercase tracking-widest mb-1 pl-2">KRW
                            (計算過程)</label>
                        <div id="calc-display"
                            class="w-full bg-slate-50 border-none px-6 py-2 rounded-xl text-base font-black text-right shadow-inner min-h-[48px] flex items-center justify-end break-all overflow-y-auto">
                            0</div>
                    </div>

                    <div class="bg-sky-600 p-3 rounded-2xl shadow-lg relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-4 opacity-10">
                            <i class="fas fa-coins text-4xl text-white"></i>
                        </div>
                        <label
                            class="block text-[10px] font-black text-white/60 uppercase tracking-widest mb-1">TWD</label>
                        <div class="flex items-baseline justify-end gap-2">
                            <span id="res-twd" class="text-3xl font-black text-white tracking-tighter">0</span>
                            <span class="text-white/60 text-xs font-bold">元</span>
                        </div>
                    </div>
                </div>

                <!-- Keypad -->
                <div class="grid grid-cols-4 gap-1">
                    <button onclick="appendCalc('7')" class="calc-btn text-slate-700 bg-slate-50">7</button>
                    <button onclick="appendCalc('8')" class="calc-btn text-slate-700 bg-slate-50">8</button>
                    <button onclick="appendCalc('9')" class="calc-btn text-slate-700 bg-slate-50">9</button>
                    <button onclick="appendCalc('/')" class="calc-btn bg-sky-50 text-sky-600">÷</button>

                    <button onclick="appendCalc('4')" class="calc-btn text-slate-700 bg-slate-50">4</button>
                    <button onclick="appendCalc('5')" class="calc-btn text-slate-700 bg-slate-50">5</button>
                    <button onclick="appendCalc('6')" class="calc-btn text-slate-700 bg-slate-50">6</button>
                    <button onclick="appendCalc('*')" class="calc-btn bg-sky-50 text-sky-600">×</button>

                    <button onclick="appendCalc('1')" class="calc-btn text-slate-700 bg-slate-50">1</button>
                    <button onclick="appendCalc('2')" class="calc-btn text-slate-700 bg-slate-50">2</button>
                    <button onclick="appendCalc('3')" class="calc-btn text-slate-700 bg-slate-50">3</button>
                    <button onclick="appendCalc('-')" class="calc-btn bg-sky-50 text-sky-600">-</button>

                    <button onclick="appendCalc('0')" class="calc-btn text-slate-700 bg-slate-50">0</button>
                    <button onclick="appendCalc('.')" class="calc-btn text-slate-700 bg-slate-50">.</button>
                    <button onclick="clearCalc()" class="calc-btn bg-red-50 text-red-500 font-bold">C</button>
                    <button onclick="appendCalc('+')" class="calc-btn bg-sky-50 text-sky-600">+</button>
                </div>

                <!-- Equal Button Floating -->
                <button id="calc-equal-btn" onclick="performManualCalc()"
                    class="w-full mt-2 bg-emerald-500 text-white py-2.5 rounded-xl shadow-lg active:scale-95 transition-all hidden flex items-center justify-center font-bold text-base">
                    完成計算 (=)
                </button>
            </div>
            <div class="h-10"></div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav
        class="fixed bottom-3 left-8 right-8 h-20 bg-white/90 backdrop-blur-xl border border-white/40 rounded-[2.5rem] shadow-[0_25px_60px_rgba(0,119,182,0.15)] z-50 flex items-center justify-around px-4">
        <a href="index.html" class="nav-btn text-slate-400 flex flex-col items-center gap-1 transition-all">
            <i class="fas fa-calendar-alt text-2xl"></i>
            <span class="text-[11px] font-bold">行程</span>
        </a>
        <a href="guide.html" class="nav-btn text-slate-400 flex flex-col items-center gap-1 transition-all">
            <i class="fas fa-map-marked-alt text-2xl"></i>
            <span class="text-[11px] font-bold">導覽</span>
        </a>
        <a href="wallet.html" class="nav-btn nav-active flex flex-col items-center gap-1 transition-all">
            <i class="fas fa-calculator text-2xl"></i>
            <span class="text-[11px] font-bold">計算機</span>
        </a>
        <a href="weather.html" class="nav-btn text-slate-400 flex flex-col items-center gap-1 transition-all">
            <i class="fas fa-cloud-sun text-2xl"></i>
            <span class="text-[11px] font-bold">天氣</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>

</html>
